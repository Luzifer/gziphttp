name: test-and-build

on:
  push: {}

permissions:
  contents: write
  issues: write

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:97150e13dbb0c5fc7e98bae477fdc5ddda57d06e8f7268039aa16a16e3136bf0
      env:
        CGO_ENABLED: 0

    runs-on: forgejo

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Marking workdir safe
        run: git config --global --add safe.directory /__w/gziphttp/gziphttp

      - name: 'Lint and test code'
        run: |
          go test -cover -v ./...
          golangci-lint run ./...

      - name: Local Build
        run: |
          go build \
            -ldflags "-s -w" \
            -mod=readonly \
            -trimpath
