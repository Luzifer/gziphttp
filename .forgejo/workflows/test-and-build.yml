name: test-and-build

on:
  push: {}

permissions:
  contents: write
  issues: write

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:f8c005c3a87d4987e40e371f152f4fedaba449bce7f060589c13250366b7eef6
      env:
        CGO_ENABLED: 0

    runs-on: forgejo

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Marking workdir safe
        run: git config --global --add safe.directory /__w/gziphttp/gziphttp

      - name: 'Lint and test code'
        run: |
          go test -cover -v ./...
          golangci-lint run ./...

      - name: Local Build
        run: |
          go build \
            -ldflags "-s -w" \
            -mod=readonly \
            -trimpath
